<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>VIP Archetype Validator</title>
  <link rel="stylesheet" href="../archetype-validator-git/styles.css?v=hover1">
</head>
<body>
  <main class="app" id="app">
    <header class="header">
      <div>
        <h1>VIP Archetype Validator</h1>
        <p class="subtitle">VIP validace: vyber primární, sekundární a případně třetí archetyp postavy.</p>
      </div>
      <div class="progress" id="progress">0 / 0</div>
    </header>

    <section class="stage" aria-live="polite">
      <div class="wheel" id="wheel" aria-label="Výběr archetypů">
        <div class="ring-labels" id="ringLabels"></div>
        <div class="center-card">
          <div class="label">Postava</div>
          <div class="name" id="characterName">Načítám…</div>
          <div class="game" id="gameTitle"></div>
        </div>
      </div>
    </section>

    <p class="selection-note" id="selectionNote">Zatím není vybrán žádný archetyp.</p>

    <nav class="controls" aria-label="Ovládání validátoru">
      <button class="btn secondary" id="skipBtn" type="button">Přeskočit</button>
      <button class="btn primary" id="confirmBtn" type="button" disabled>Potvrdit výběr</button>
    </nav>

    <footer class="footer">
      <button class="linkbtn" id="exportBtn" type="button">Export lokálních dat</button>
      <span class="status" id="status"></span>
    </footer>
  </main>

  <template id="archetypeTemplate">
    <button class="arch" type="button">
      <span class="rank"></span>
      <span class="arch-name"></span>
    </button>
  </template>

  <script src="config.js?v=vip1"></script>
  <script src="vip_runtime_patch.js?v=vip2"></script>
  <script src="../archetype-validator-git/character_order_cleanup.js?v=henry3"></script>
  <script src="../archetype-validator-git/back_button_patch.js?v=back1"></script>
  <script src="../archetype-validator-git/archetype_side_panels.js?v=back1"></script>
  <script src="../archetype-validator-git/ui_patch_show_game.js?v=back1"></script>
</body>
</html>
