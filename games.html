const $=id=>document.getElementById(id);function set(id,v){const e=$(id);if(e)e.textContent=v}function addText(p,tag,cls,v){if(!v)return;const e=document.createElement(tag);e.className=cls;e.textContent=v;p.appendChild(e);return e}function addMulti(p,tag,cls,v){const e=document.createElement(tag);e.className=cls;v.split('\n').forEach((x,i)=>{if(i)e.appendChild(document.createElement('br'));e.appendChild(document.createTextNode(x))});p.appendChild(e);return e}
function updateStatic(){document.documentElement.lang=lang;const t=T[lang];set('presentation-label',document.body.classList.contains('presentation-mode')?t.stop:t.presentation);set('info-toggle',infoOnly?t.infoOn:t.info);set('lang-toggle',t.lang);set('hero-lead',t.heroLead);set('hero-note',t.heroNote);set('hero-qr-title',t.heroQrTitle);set('hero-qr-note',t.heroQrNote);set('p1t',t.p1t);set('p1x',t.p1x);set('p2t',t.p2t);set('p2x',t.p2x);set('p3t',t.p3t);set('p3x',t.p3x);set('section-eyebrow',t.sectionEyebrow);set('section-title',t.sectionTitle);set('section-lead',t.sectionLead);set('qr-title',t.qrTitle);set('qr-lead',t.qrLead);set('youtube-title',t.youtubeTitle);set('youtube-text',t.youtubeText);set('gamejam-title',t.gamejamTitle);set('gamejam-text',t.gamejamText);set('brand-kicker',t.brandKicker);set('brand-meta',t.brandMeta);set('page-qr-label',t.full);set('page-qr-hint',t.fullHint)}
function gameCard(g){const a=document.createElement('a');a.className='game-card showcase-slide';a.href=g.href;a.target='_blank';a.rel='noopener';const w=document.createElement('div');w.className='img-wrap';const im=document.createElement('img');applyImg(im,g.image,g.title);w.appendChild(im);const b=document.createElement('div');b.className='game-body';addText(b,'h3','game-title',g.title);addText(b,'p','game-type',tr(g.type));addText(b,'p','game-platforms',tr(g.platforms));addText(b,'p','game-blurb',tr(g.blurb));a.append(w,b);$('games-grid').appendChild(a)}
function promoCard(s){const d=s[lang];const a=document.createElement('article');a.className='promo-card showcase-slide';a.dataset.qrTarget=s.href||PAGE_URL;a.dataset.qrTitle=d.title.replace(/\n/g,' ');const m=document.createElement('div');m.className='promo-media';const im=document.createElement('img');applyImg(im,s.image,d.title.replace(/\n/g,' '));m.appendChild(im);const b=document.createElement('div');b.className='promo-body';addText(b,'p','promo-kicker',d.kicker);addMulti(b,'h3','promo-title',d.title);addText(b,'p','promo-text',d.text);addText(b,'p','promo-secondary',d.secondary);const tg=document.createElement('div');tg.className='tags';d.tags.forEach(x=>addText(tg,'span','tag',x));b.appendChild(tg);a.append(m,b);$('games-grid').appendChild(a)}
function render(){const g=$('games-grid');g.innerHTML='';let p=0;if(promoSlides[p])promoCard(promoSlides[p++]);games.forEach((game,i)=>{gameCard(game);if((i+1)%5===0&&promoSlides[p])promoCard(promoSlides[p++])});while(promoSlides[p])promoCard(promoSlides[p++]);slides=[...document.querySelectorAll('.showcase-slide')];infoSlides=slides.filter(x=>x.classList.contains('promo-card'))}
function qr(u){return QR_API+encodeURIComponent(u)}function active(){return infoOnly?infoSlides:slides}function title(s){return s.dataset.qrTitle||s.querySelector('.game-title')?.textContent||'Visual Computing and Game Design'}function show(i){const a=active();if(!a.length)return;index=((i%a.length)+a.length)%a.length;slides.forEach(s=>s.classList.remove('is-presenting'));const cur=a[index];cur.classList.add('is-presenting');const isPromo=cur.classList.contains('promo-card');const u=cur.dataset.qrTarget||cur.href||PAGE_URL;const ti=title(cur);$('current-link').href=u;$('current-qr').src=qr(u);set('current-title',ti);set('current-label',isPromo?T[lang].learn:T[lang].project);set('current-hint',isPromo?T[lang].infoHint:T[lang].projectHint);set('counter',(index+1)+'/'+a.length)}function schedule(){clearInterval(timer);timer=setInterval(()=>show(index+1),INTERVAL)}
function start(fs=true){if(!slides.length)return;document.body.classList.add('presentation-mode');document.querySelector('.icon').textContent='■';set('presentation-label',T[lang].stop);show(index);schedule();if(fs&&document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{})}function stop(){document.body.classList.remove('presentation-mode');slides.forEach(s=>s.classList.remove('is-presenting'));clearInterval(timer);document.querySelector('.icon').textContent='▶';set('presentation-label',T[lang].presentation);if(document.fullscreenElement&&document.exitFullscreen)document.exitFullscreen().catch(()=>{})}
function setLang(l){const was=document.body.classList.contains('presentation-mode');lang=l;localStorage.setItem('games-lang',lang);updateStatic();index=0;render();if(was){document.body.classList.add('presentation-mode');document.querySelector('.icon').textContent='■';set('presentation-label',T[lang].stop);show(0);schedule()}}
$('presentation-toggle').onclick=()=>document.body.classList.contains('presentation-mode')?stop():start(true);$('info-toggle').onclick=()=>{infoOnly=!infoOnly;set('info-toggle',infoOnly?T[lang].infoOn:T[lang].info);index=0;if(!document.body.classList.contains('presentation-mode'))start(true);else{show(0);schedule()}};$('lang-toggle').onclick=()=>setLang(lang==='cs'?'en':'cs');
document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='l'){setLang(lang==='cs'?'en':'cs');return}if(!document.body.classList.contains('presentation-mode'))return;if(e.key==='Escape')stop();if(e.key.toLowerCase()==='i')$('info-toggle').click();if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();show(index+1);schedule()}if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();show(index-1);schedule()}});document.addEventListener('fullscreenchange',()=>{if(!document.fullscreenElement&&document.body.classList.contains('presentation-mode'))stop()});
updateStatic();render();const params=new URLSearchParams(location.search);if(params.has('info')||params.get('present')==='info'||params.get('presentation')==='info'){infoOnly=true;set('info-toggle',T[lang].infoOn);start(false)}else if(params.has('present')||params.has('presentation'))start(false);
</script>
