const games=[{title:"KolejenkuPls",type:{cs:"Bakalářská práce",en:"Bachelor thesis"},platforms:"Windows / video",href:"https://www.youtube.com/watch?v=AQNmMeknEpM",image:"/assets/games/05 kolejenkupls.jpg",blurb:{cs:"Čerstvě dokončená bakalářská práce a zároveň simulátor jednoho z nejděsivějších úřadů studentského života: přidělování kolejí. Hráč sedí na druhé straně přepážky a rozhoduje, kdo dostane vytouženou postel, kdo skončí na čekací listině a kdo pozná, že i administrativní systém může být survival horor.",en:"A recently finished bachelor thesis and a simulator of one of the most terrifying offices in student life: dormitory allocation. The player sits behind the desk and decides who gets a bed, who ends up on the waiting list, and who discovers that even an administrative system can become survival horror."}},{title:"Strahov Gang",type:"VHS course",platforms:"Unreal Engine",href:"https://www.youtube.com/",image:"/assets/games/08 strahov.jpg",blurb:{cs:"Vtipně-hororová výprava do těžkého studentského života na Strahově: dlouhé chodby, divné zvuky za dveřmi, nedostatek spánku, zkouškové za krkem a atmosféra, ve které si nejste jistí, jestli vás děsí spíš příšera, kolejní sprcha, nebo další deadline.",en:"A funny horror trip into the difficult student life at Strahov: long corridors, strange sounds behind doors, lack of sleep, exams breathing down your neck, and an atmosphere where you are not sure what is scarier — the monster, the dorm shower, or the next deadline."}},{title:"FIT Life",type:{cs:"Bakalářská práce",en:"Bachelor thesis"},platforms:"Web",href:"https://antik98.github.io/FitLife/",image:"/assets/games/04 FitLife.png",blurb:{cs:"Simulace posledních tří dnů prvního semestru na FIT. Je třeba stíhat testy, přednášky, semestrálky a neumřít u toho hlady. K tomu navíc najít co nejvíc easter eggů ukrytých ve škole, rozvrhu i studentském zoufalství.",en:"A simulation of the last three days of the first semester at FIT. You need to survive tests, lectures, semester projects and avoid starving to death. On top of that, try to find as many easter eggs as possible hidden in the school, schedule and student despair."}},{title:"Factory Reset",type:{cs:"Bohemia Gamejam 2026 · 3. místo",en:"Bohemia Gamejam 2026 · 3rd place"},platforms:"Windows · multiplayer",href:"https://itch.io/jam/bohemia-gamejam/rate/4509014",image:"https://img.itch.zone/aW1nLzI2OTA4ODk1LnBuZw%3D%3D/315x250%23c/Z6YcOp.png",blurb:{cs:"Asymetrická multiplayerová hra, která na Bohemia GameJamu 2026 získala 3. místo: robot utíká z továrny, zatímco administrátor mu škodí hackerskými zásahy.",en:"An asymmetric multiplayer game that won 3rd place at Bohemia GameJam 2026: a robot tries to escape a factory while an administrator sabotages it."}},{title:"After The Rain",type:"GameJam FIT 2026",platforms:"Web",href:"https://finishx.itch.io/after-the-rain",image:"https://img.itch.zone/aW1hZ2UvNDQ0NDY3NC8yNjU1MjkwNy5wbmc=/original/rJGYVt.png",blurb:{cs:"Cozy narativní puzzle adventura, ve které se stanete malým houbovým tvorem a snažíte se zachránit svůj úl. Rozhodnutí, rozhovory i interakce s lesem mění výsledek, každý návrat mění příležitosti a existují tři různé cesty k záchraně úlu.",en:"A cozy narrative puzzle adventure where you become a tiny mushroom creature trying to save your hive. Decisions, dialogue and forest interactions change the outcome, every return changes the opportunities, and there are three different ways to save the hive."}},{title:"Sladká pomsta",type:{cs:"Bakalářská práce",en:"Bachelor thesis"},platforms:"Web / Windows",href:"https://pospec.itch.io/sladka-pomsta",image:"/assets/games/01-sladka pomsta.jpg",blurb:{cs:"Karetní RPG s medem, kde hrajete za medvěda.",en:"A card RPG full of honey where you play as a bear."}},{title:"Chrysalis",type:{cs:"Bakalářská práce",en:"Bachelor thesis"},platforms:"Linux / Windows / Web",href:"https://liaaq.itch.io/chrysalis",image:"/assets/games/02 chysalis.png",blurb:{cs:"Narativní top-down pixelovka, ve které hráč bojuje s různými negativními stránkami osobnosti: depresí, strachem a OCD. Překonává je v jednotlivých levelech a především v boss fightech, kde vnitřní konflikty dostávají konkrétní herní podobu.",en:"A narrative top-down pixel game where the player fights different negative sides of the self: depression, fear and OCD. They are overcome through levels and especially boss fights, where inner conflicts become concrete game challenges."}},{title:"HaLLMark",type:{cs:"Diplomová práce",en:"Master thesis"},platforms:"Linux / Windows",href:"https://mogula99.itch.io/hallmark",image:"/assets/games/03 hallmark.png",blurb:{cs:"Plně textová hra generovaná a řízená LLM mechanikami i příběhem. Místo pevně napsaných scén používá jazykový model jako motor událostí, rozhodování a správy království.",en:"A fully text-based game generated and controlled by LLM-driven mechanics and story. Instead of fixed scenes, it uses a language model as the engine of events, decisions and kingdom management."}},{title:"Bear Café",type:{cs:"Bakalářská práce",en:"Bachelor thesis"},platforms:"Web",href:"https://play.unity.com/en/games/dfd180ed-7a16-4601-961f-ee8e8ca2ba76/bear-cafe-2",image:"/assets/games/07 bearcafe.jpg",blurb:{cs:"Cozy relaxační hra, ve které se člověk vžije do majitele malého obchůdku: peče croissanty, připravuje kávu a stará se o příjemnou atmosféru medvědí kavárny.",en:"A cozy relaxing game where you become the owner of a small shop: bake croissants, make coffee and take care of the warm atmosphere of a bear café."}},{title:"Galaxy Golf",type:"GameJam",platforms:"Linux / Windows",href:"https://lukydrum.itch.io/galaxy-golf",image:"/assets/games/11 galaxygolf.png",blurb:{cs:"Planety je třeba uklidit do černých děr.",en:"Planets need to be cleaned up into black holes."}},{title:"Útěk z Brna",type:"GameJam",platforms:"Windows / Web",href:"https://trampod.itch.io/escape-from-brno",image:"/assets/games/13 brno.jpg",blurb:{cs:"Dokumentární biografická hra o anonymním Pražákovi, který se snaží přežít krutou realitu místa zvaného Brno. V cestě mu stojí místní Brňáci, šaliny i samotná cesta, která jako by nechtěla dovolit návrat do civilizace.",en:"A documentary biographical game about an anonymous Prague citizen trying to survive the cruel reality of a place called Brno. Local Brno residents, trams and even the road itself try to stop the return to civilization."}},{title:"Whitenoise",type:"GameJam",platforms:"Windows",href:"https://belonzik.itch.io/whitenoise",image:"/assets/games/14 whitenoise.png",blurb:{cs:"2D puzzle-platformer, kde překážky nejsou jen plošiny a pasti, ale i vlastní vzpomínky. Hráč se s nimi musí vyrovnat, použít je k postupu, nebo se rozhodnout, co všechno je ochoten obětovat, aby šel dál.",en:"A 2D puzzle platformer where the obstacles are not only platforms and traps, but also your own memories. The player must face them, use them to progress, or decide what they are willing to sacrifice to move on."}},{title:"Godwork",type:"GameJam",platforms:"Windows",href:"https://belonzik.itch.io/godwork",image:"/assets/games/17 godwork.jpg",blurb:{cs:"Strategie o začínajícím bohu, který chce, aby jej uctívala celá Země. Lidé chtějí zázraky ve formě zdrojů, ostatní bohové soupeří o víru a vy musíte pomocí proroctví, produkce a festivalů dokázat, že právě vy jste ten nejlepší maják naděje.",en:"A strategy game about an up-and-coming god trying to make all of Earth worship them. People demand miracles in the form of resources, rival gods compete for faith, and you must use prophecies, production and festivals to prove that you are the best beacon of hope."}},{title:"Únikovka FIT",type:{cs:"Fyzická escape hra",en:"Physical escape game"},platforms:{cs:"Fyzická hra",en:"Physical game"},href:"https://grafit.games/",image:"/assets/games/15 escaperoon.png",blurb:{cs:"Stavíme i fyzické únikové hry.",en:"We also build physical escape games."}},{title:"Drákulův hrad",type:{cs:"GameJam · desková hra",en:"GameJam · board game"},platforms:{cs:"Desková hra",en:"Board game"},href:"https://bremondr.itch.io/muj-dum-drakulv-hrad",image:"/assets/games/15 drákula.jpg",blurb:{cs:"Deskovka o vyhnání Drákuly z vlastního hradu.",en:"A board game about driving Dracula out of your own castle."}},{title:"Adventní kalendář",type:{cs:"Bonus",en:"Bonus"},platforms:{cs:"Sada webových her",en:"Web game collection"},href:"https://grafit.games/",image:"/assets/games/16 adventni kalendar.png",blurb:{cs:"Herní adventní kalendář — každý den jeden level.",en:"A game advent calendar — one level every day."}}];
let lang=(new URLSearchParams(location.search).get('lang')||localStorage.getItem('games-lang')||'cs');if(!['cs','en'].includes(lang))lang='cs';let slides=[],infoSlides=[],index=0,timer=null,infoOnly=false;const $=id=>document.getElementById(id);function set(id,v){const e=$(id);if(e)e.textContent=v}function addText(p,t,c,v){if(!v)return;const e=document.createElement(t);e.className=c;e.textContent=v;p.appendChild(e);return e}function addMulti(p,t,c,v){const e=document.createElement(t);e.className=c;v.split('\n').forEach((x,i)=>{if(i)e.appendChild(document.createElement('br'));e.append(x)});p.appendChild(e)}function updateStatic(){const t=T[lang];document.documentElement.lang=lang;set('presentation-label',document.body.classList.contains('presentation-mode')?t.stop:t.presentation);set('info-toggle',infoOnly?t.infoOn:t.info);set('lang-toggle',t.lang);['heroLead','heroNote','heroQrTitle','heroQrNote','p1t','p1x','p2t','p2x','p3t','p3x','sectionEyebrow','sectionTitle','sectionLead','qrTitle','qrLead','brandKicker','brandMeta'].forEach(k=>set(k.replace(/[A-Z]/g,m=>'-'+m.toLowerCase()),t[k]));set('page-qr-label',t.full);set('page-qr-hint',t.fullHint)}function gameCard(g){const a=document.createElement('a');a.className='game-card showcase-slide';a.href=g.href;a.target='_blank';a.rel='noopener';const w=document.createElement('div');w.className='img-wrap';const im=document.createElement('img');applyImg(im,g.image,g.title);w.append(im);const b=document.createElement('div');b.className='game-body';addText(b,'h3','game-title',g.title);addText(b,'p','game-type',tr(g.type));addText(b,'p','game-platforms',tr(g.platforms));addText(b,'p','game-blurb',tr(g.blurb));a.append(w,b);$('games-grid').append(a)}function promoCard(s){const d=s[lang];const a=document.createElement('article');a.className='promo-card showcase-slide';a.dataset.qrTarget=s.href||PAGE_URL;a.dataset.qrTitle=d.title.replace(/\n/g,' ');const m=document.createElement('div');m.className='promo-media';const im=document.createElement('img');applyImg(im,s.image,d.title);m.append(im);const b=document.createElement('div');b.className='promo-body';addText(b,'p','promo-kicker',d.kicker);addMulti(b,'h3','promo-title',d.title);addText(b,'p','promo-text',d.text);addText(b,'p','promo-secondary',d.secondary);const tg=document.createElement('div');tg.className='tags';d.tags.forEach(x=>addText(tg,'span','tag',x));b.append(tg);a.append(m,b);$('games-grid').append(a)}function render(){const g=$('games-grid');g.innerHTML='';let p=0;if(promoSlides[p])promoCard(promoSlides[p++]);games.forEach((game,i)=>{gameCard(game);if((i+1)%6===0&&promoSlides[p])promoCard(promoSlides[p++])});while(promoSlides[p])promoCard(promoSlides[p++]);slides=[...document.querySelectorAll('.showcase-slide')];infoSlides=slides.filter(x=>x.classList.contains('promo-card'))}function qr(u){return QR_API+encodeURIComponent(u)}function active(){return infoOnly?infoSlides:slides}function title(s){return s.dataset.qrTitle||s.querySelector('.game-title')?.textContent||'Visual Computing and Game Design'}function show(i){const a=active();if(!a.length)return;index=((i%a.length)+a.length)%a.length;slides.forEach(s=>s.classList.remove('is-presenting'));const cur=a[index];cur.classList.add('is-presenting');const promo=cur.classList.contains('promo-card'),u=cur.dataset.qrTarget||cur.href||PAGE_URL;$('current-link').href=u;$('current-qr').src=qr(u);set('current-title',title(cur));set('current-label',promo?T[lang].learn:T[lang].project);set('current-hint',promo?T[lang].infoHint:T[lang].projectHint);set('counter',(index+1)+'/'+a.length)}function schedule(){clearInterval(timer);timer=setInterval(()=>show(index+1),INTERVAL)}function start(fs=true){document.body.classList.add('presentation-mode');document.querySelector('#presentation-toggle span').textContent='■';set('presentation-label',T[lang].stop);show(index);schedule();if(fs&&document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{})}function stop(){document.body.classList.remove('presentation-mode');slides.forEach(s=>s.classList.remove('is-presenting'));clearInterval(timer);document.querySelector('#presentation-toggle span').textContent='▶';set('presentation-label',T[lang].presentation);if(document.fullscreenElement)document.exitFullscreen().catch(()=>{})}function setLang(l){const was=document.body.classList.contains('presentation-mode');lang=l;localStorage.setItem('games-lang',lang);updateStatic();index=0;render();if(was)start(false)}$('presentation-toggle').onclick=()=>document.body.classList.contains('presentation-mode')?stop():start(true);$('info-toggle').onclick=()=>{infoOnly=!infoOnly;set('info-toggle',infoOnly?T[lang].infoOn:T[lang].info);index=0;document.body.classList.contains('presentation-mode')?show(0):start(true);schedule()};$('lang-toggle').onclick=()=>setLang(lang==='cs'?'en':'cs');document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='l')return setLang(lang==='cs'?'en':'cs');if(!document.body.classList.contains('presentation-mode'))return;if(e.key==='Escape')stop();if(e.key.toLowerCase()==='i')$('info-toggle').click();if(['ArrowRight',' ','PageDown'].includes(e.key)){e.preventDefault();show(index+1);schedule()}if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();show(index-1);schedule()}});document.addEventListener('fullscreenchange',()=>{if(!document.fullscreenElement&&document.body.classList.contains('presentation-mode'))stop()});updateStatic();render();const params=new URLSearchParams(location.search);if(params.has('info')||params.get('present')==='info'||params.get('presentation')==='info'){infoOnly=true;set('info-toggle',T[lang].infoOn);start(false)}else if(params.has('present')||params.has('presentation'))start(false);
